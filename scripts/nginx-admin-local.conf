# Локальный reverse-proxy для админ Mini App.
# Слушает 127.0.0.1:8080 → Vite :5173 и API :8000
# Публичный HTTPS: ngrok http 127.0.0.1:8080

worker_processes  1;
error_log  /tmp/luma-nginx-error.log;
pid        /tmp/luma-nginx.pid;

events {
    worker_connections  64;
}

http {
    access_log /tmp/luma-nginx-access.log;
    include    /opt/homebrew/etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;

    server {
        listen 127.0.0.1:8080;
        server_name _;

        location / {
            proxy_pass http://127.0.0.1:5173;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:8000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
